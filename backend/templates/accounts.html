<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts - Banking Cloud Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
</head>

<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-bank"></i> Banking Cloud</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto gap-2">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link active" href="/accounts-page">Accounts</a>
          <a class="nav-link" href="/transactions-page">Transactions</a>
          <a class="nav-link" href="/analytics-page">Analytics</a>
          <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <!-- Header -->
    <div class="mb-4">
      <h1 class="h2 fw-bold">Account Management</h1>
      <p class="text-muted">Create and manage your bank accounts</p>
    </div>

    <!-- Create Account Card -->
    <div class="row mb-4">
      <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white">
            <h5 class="mb-0">Create New Account</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label for="new-name" class="form-label">Account Name</label>
              <input id="new-name" class="form-control" placeholder="e.g., My Savings Account">
            </div>

            <div class="mb-3">
              <label for="new-type" class="form-label">Account Type</label>
              <select id="new-type" class="form-select">
                <option value="checking">Checking</option>
                <option value="savings">Savings</option>
              </select>
            </div>

            <button class="btn btn-primary w-100" onclick="createAccount()">
              <i class="bi bi-plus-circle"></i> Create Account
            </button>
            <div id="create-msg" class="mt-2"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Accounts Table -->
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Your Accounts</h5>
        <button class="btn btn-sm btn-primary" onclick="loadAccounts()">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
      <div class="card-body">
        <div style="overflow-x: auto;">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Account Name</th>
                <th>Type</th>
                <th>Balance</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="accounts-tbody">
              <tr>
                <td colspan="4" class="text-center text-muted py-4">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>

  <script>
    function logout() {
      clearToken();
      window.location.href = '/';
    }

    async function loadAccounts() {
      const res = await apiCall('/api/accounts');
      if (res.error) {
        document.getElementById("accounts-tbody").innerHTML = 
          '<tr><td colspan="4" class="text-center text-danger">Error: ' + res.error + '</td></tr>';
        return;
      }
      
      const tbody = document.getElementById("accounts-tbody");
      tbody.innerHTML = "";
      
      const accounts = res.accounts || [];
      
      if (accounts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No accounts yet. Create one!</td></tr>';
        return;
      }
      
      accounts.forEach(acc => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${acc.name}</td>
          <td><span class="badge bg-light text-dark">${acc.type}</span></td>
          <td>₹${parseFloat(acc.balance || 0).toFixed(2)}</td>
          <td><span class="badge bg-success">${acc.status}</span></td>
        `;
        tbody.appendChild(row);
      });
    }

    async function createAccount() {
      const name = document.getElementById("new-name").value.trim();
      const type = document.getElementById("new-type").value;
      const msgDiv = document.getElementById("create-msg");

      if (!name) {
        msgDiv.className = "alert alert-danger";
        msgDiv.textContent = "❌ Please enter account name";
        return;
      }

      msgDiv.className = "alert alert-info";
      msgDiv.textContent = "Creating account...";

      const res = await apiCall('/api/accounts', {
        method: 'POST',
        body: JSON.stringify({ name, type })
      });

      if (res.error) {
        msgDiv.className = "alert alert-danger";
        msgDiv.textContent = "❌ " + res.error;
        return;
      }

      msgDiv.className = "alert alert-success";
      msgDiv.textContent = "✅ Account created successfully!";
      
      document.getElementById("new-name").value = "";
      setTimeout(() => {
        msgDiv.textContent = "";
        msgDiv.className = "";
        loadAccounts();
      }, 2000);
    }

    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAuth()) return;
      loadAccounts();
    });
  </script>
</body>
</html>
