<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banking Cloud Analytics - Login</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Unified CSS -->
  <link rel="stylesheet" href="/static/css/base.css">
</head>

<body class="login-page-bg">

  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <h1><i class="bi bi-bank"></i> Banking Cloud</h1>
      <p class="text-muted mb-0">Secure Financial Management</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('login')">Login</button>
      <button class="tab-button" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login" class="tab-content active">
      <div class="form-group mb-3">
        <label for="lemail">Email Address</label>
        <input id="lemail" type="email" class="form-control" placeholder="you@example.com">
      </div>

      <div class="form-group mb-3">
        <label for="lpass">Password</label>
        <input id="lpass" type="password" class="form-control" placeholder="••••••••">
      </div>

      <button class="btn btn-primary w-100 mb-3" onclick="loginUser()">
        <i class="bi bi-box-arrow-in-right"></i> Login
      </button>
      <div id="login-msg" class="message"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="register" class="tab-content">
      <div class="form-group mb-3">
        <label for="remail">Email Address</label>
        <input id="remail" type="email" class="form-control" placeholder="you@example.com">
      </div>

      <div class="form-group mb-3">
        <label for="rpass">Password</label>
        <input id="rpass" type="password" class="form-control" placeholder="••••••••">
      </div>

      <button class="btn btn-primary w-100 mb-3" onclick="registerUser()">
        <i class="bi bi-person-plus"></i> Register
      </button>
      <div id="register-msg" class="message"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
  
  <script>
    // Tab switching function
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    // Check if user is already logged in - redirect to dashboard
    document.addEventListener('DOMContentLoaded', function() {
      if (isLoggedIn()) {
        window.location.href = '/dashboard';
      }
    });
  </script>
</body>
</html>
